---
- name: Install LAMP stack
  hosts: all
  become: yes
  tasks:
    - name: Install Apache
      apt:
        name: apache2
        state: present
    - name: Start Apache
      service:
        name: apache2
        state: started

    - name: Install MySQL
      apt: 
        name: mysql-server
        state: present
    - name: Install PHP
      apt:
        name: php
        state: present
    
      